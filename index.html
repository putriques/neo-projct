  <!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meus objetivos do ano</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="conteudo-principal">
      <h2 class="titulo-principal">Meus Objetivos do ano<span>_</span></h2>
      <div class="botoes-grade">
        <div class="botoes">
          <button class="botao escuro cor-palavras-botoes" id="btn1">Faculdade</button>
          <button class="botao cor-palavras-botoes" id="btn2">Criar projetos em Javascript</button>
          <button class="botao cor-palavras-botoes" id="btn3">Emprego</button>
          <button class="botao cor-palavras-botoes" id="btn4">Especialização</button>
        </div>
        <div class="grade">
          <h2 class="titulo-objetivo" id="titulo">Faculdade</h2>
          <div>
            <h2 class="tempo cor-palavras-tempo">Tempo para completar objetivo</h2>
          </div>
          <div class="tempo">
            <div class="bloco">
              <h1 class="numero" id="meses">10</h1>
              <h2 class="cor-palavras-tempo">Meses</h2>
            </div>

            <div class="bloco">
              <h1 class="numero" id="dias">5</h1>
              <h2 class="cor-palavras-tempo">Dias</h2>
            </div>

            <div class="bloco">
              <h1 class="numero" id="horas">6</h1>
              <h2 class="cor-palavras-tempo">Horas</h2>
            </div>

            <div class="bloco">
              <h1 class="numero" id="minutos">50</h1>
              <h2 class="cor-palavras-tempo">Minutos</h2>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="main.js"></script>
  </body>
</html>
